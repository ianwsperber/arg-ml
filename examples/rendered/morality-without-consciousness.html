<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morality without Consciousness</title>
<style>
:root {
  --bg: #ffffff;
  --bg-tint: #f4f2ec;
  --paper: #ffffff;
  --ink: #1c1b18;
  --ink-soft: #2d2a23;
  --muted: #6b6962;
  --muted-2: #a09c92;
  --rule: #d8d4c8;
  --rule-soft: #ece8dc;
  --accent: #7a4a1f;
  --accent-soft: #b88753;
  --highlight: rgba(184, 135, 83, 0.1);
  --highlight-strong: rgba(184, 135, 83, 0.22);

  --tint-supports: #4a6a3e;
  --tint-attacks: #8a3434;
  --tint-rests: #6a614a;

  --serif:
    "Source Serif 4", "Source Serif Pro", Charter, "Iowan Old Style", Georgia,
    serif;
  --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* {
  box-sizing: border-box;
}
html,
body {
  background: var(--bg);
  color: var(--ink);
  margin: 0;
}
body {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.62;
  font-feature-settings: "kern", "liga", "onum";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
}

/* --------- shell --------- */
#root {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 28px 96px;
}

.doc-header {
  max-width: 680px;
  margin: 64px auto 18px;
}
.doc-eyebrow {
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.doc-title {
  font-family: var(--serif);
  font-size: 46px;
  line-height: 1.08;
  font-weight: 600;
  letter-spacing: -0.012em;
  margin: 0 0 14px;
  text-wrap: balance;
}
.doc-byline {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  align-items: baseline;
}
.doc-byline .sep {
  color: var(--muted-2);
}
.doc-byline a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px dotted var(--muted-2);
}
.doc-byline a:hover {
  border-bottom-color: var(--ink);
  color: var(--ink);
}

.epistemic-banner {
  max-width: 680px;
  margin: 0 auto 24px;
  padding: 14px 18px 16px;
  background: #faf6ec;
  border-left: 2px solid var(--accent);
  font-size: 15.5px;
  color: var(--ink-soft);
}
.epistemic-banner .label {
  display: block;
  font-family: var(--sans);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}

/* --------- toolbar --------- */
.toolbar {
  position: sticky;
  top: 14px;
  z-index: 30;
  max-width: 720px;
  margin: 8px auto 28px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 7px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(10px) saturate(1.1);
  border: 1px solid var(--rule-soft);
  border-radius: 999px;
  box-shadow:
    0 1px 0 rgba(0, 0, 0, 0.02),
    0 8px 24px -16px rgba(60, 40, 20, 0.18);
}
.toolbar .brand {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0 12px 0 8px;
  border-right: 1px solid var(--rule-soft);
  margin-right: 4px;
}
.toolbar .group {
  display: flex;
  gap: 2px;
  flex: 1;
}
.toolbar .btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  background: transparent;
  border: 0;
  padding: 7px 14px;
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  gap: 8px;
  align-items: center;
  transition: background 120ms;
}
.toolbar .btn:hover {
  background: var(--bg-tint);
}
.toolbar .btn[aria-pressed="true"] {
  background: var(--ink);
  color: var(--paper);
}
.toolbar .btn[aria-pressed="true"]:hover {
  background: #2c2a23;
}
.toolbar .btn .dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--muted-2);
}
.toolbar .btn[aria-pressed="true"] .dot {
  background: var(--paper);
}

/* --------- reader grid --------- */
.reader {
  display: grid;
  grid-template-columns: minmax(0, 1fr) min(680px, calc(100% - 0px)) minmax(
      0,
      1fr
    );
  column-gap: 28px;
  position: relative;
}
.reader > .prose {
  grid-column: 2;
  position: relative;
  min-width: 0;
}
.reader > .right-gutter {
  grid-column: 3;
  position: relative;
  min-width: 0;
}
.reader > .left-gutter {
  grid-column: 1;
  position: relative;
  min-width: 0;
}
.reader > .arrows {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  width: 100%;
  height: 100%;
}

@media (max-width: 1200px) {
  .reader {
    grid-template-columns: minmax(0, 1fr) min(680px, 100%) 280px;
    column-gap: 22px;
  }
}
@media (max-width: 1100px) {
  .reader {
    grid-template-columns: 1fr;
    column-gap: 0;
  }
  .reader > .prose {
    grid-column: 1;
    max-width: 680px;
    margin: 0 auto;
  }
  .reader > .right-gutter {
    display: none;
  }
  .reader > .left-gutter {
    display: none;
  }
  .reader > .arrows {
    display: none;
  }
}

/* --------- prose --------- */
.prose h2 {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -0.008em;
  margin: 56px 0 14px;
  text-wrap: balance;
}
.prose h2 .h-rule {
  display: block;
  width: 32px;
  height: 1px;
  background: var(--accent);
  margin: 0 0 18px;
}
.prose h3 {
  font-size: 22px;
  margin: 36px 0 10px;
  font-weight: 600;
}
.prose p {
  margin: 0 0 18px;
  text-wrap: pretty;
}
.prose em {
  font-style: italic;
}
.prose strong {
  font-weight: 600;
}
.prose a {
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  transition: border-color 120ms;
}
.prose a:hover {
  border-bottom-color: var(--ink);
}
.prose code {
  font-family: var(--mono);
  font-size: 0.86em;
  background: var(--bg-tint);
  padding: 1px 4px;
  border-radius: 3px;
}

/* --------- annotated spans (in-text, default state subtle) --------- */
.ann-term {
  border-bottom: 1px dotted var(--muted-2);
  cursor: help;
  transition:
    background 120ms,
    border-color 120ms;
}
.ann-term[data-external="true"]::after {
  content: "↗";
  font-size: 0.62em;
  vertical-align: super;
  margin-left: 0.06em;
  color: var(--muted-2);
}

.ann-claim {
  cursor: help;
  position: relative;
  border-radius: 2px;
  transition: background 140ms;
}

.ann-claim.is-active,
.ann-term.is-active {
  background: var(--highlight-strong);
}
.ann-claim.is-related {
  background: var(--highlight);
  outline: 1px dashed var(--accent-soft);
  outline-offset: 1px;
}
.ann-claim[data-defeasible="false"] {
  border-bottom: 1px solid var(--accent-soft);
}

/* Inference block */
.inference-block {
  margin: 26px 0;
  padding: 14px 18px;
  background: var(--bg-tint);
  border-left: 2px solid var(--accent);
  border-radius: 0 4px 4px 0;
  position: relative;
  font-style: italic;
  font-size: 17px;
  line-height: 1.55;
}
.inference-block .inf-head {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  font-style: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.inference-block .inf-meta {
  color: var(--muted);
  margin-left: 4px;
  text-transform: none;
  letter-spacing: 0;
  font-family: var(--mono);
  font-size: 11px;
}

/* Evidence superscript */
.ann-evidence {
  font-family: var(--mono);
  font-size: 0.62em;
  font-style: normal;
  vertical-align: super;
  color: var(--accent);
  text-decoration: none;
  margin-left: 1px;
  padding: 0 2px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--paper);
  cursor: help;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.ann-evidence:hover {
  background: var(--bg-tint);
}

/* Note → numbered superscript */
.ann-note-marker {
  font-family: var(--mono);
  font-size: 0.62em;
  vertical-align: super;
  color: var(--accent);
  text-decoration: none;
  margin: 0 1px;
  padding: 0 3px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 2px;
  cursor: pointer;
}
.ann-note-marker:hover {
  background: var(--bg-tint);
}

/* --------- gloss chips in right gutter --------- */
.right-gutter {
  min-height: 100%;
}
.gloss-group {
  position: absolute;
  left: 0;
  right: 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  pointer-events: auto;
}
.gloss-more {
  align-self: flex-start;
  margin-top: 2px;
  font: 9.5px var(--mono);
  color: var(--muted-2);
  letter-spacing: 0.05em;
  background: transparent;
  border: 0;
  padding: 2px 0;
  cursor: pointer;
  text-align: left;
}
.gloss-more:hover {
  color: var(--accent);
}
.gloss-row {
  font-family: var(--sans);
  font-size: 12px;
  line-height: 1.42;
  color: var(--muted);
  border-left: 2px solid var(--rule-soft);
  padding: 3px 0 3px 10px;
  cursor: default;
  transition:
    border-color 120ms ease,
    background 120ms ease,
    padding 120ms ease;
}
.gloss-row > :not(.gloss-head) {
  display: none;
}
.gloss-row > .gloss-head {
  margin-bottom: 0;
  cursor: pointer;
}
.gloss-row.is-expanded {
  padding: 6px 0 8px 10px;
}
.gloss-row.is-expanded > * {
  display: block;
}
.gloss-row.is-expanded > .gloss-head {
  display: flex;
  margin-bottom: 4px;
}
.gloss-row.is-expanded > .rel {
  display: grid;
}
.gloss-row:hover {
  border-left-color: var(--muted-2);
  background: rgba(0, 0, 0, 0.015);
}
.gloss-row.is-active {
  border-left-color: var(--accent);
  background: rgba(184, 135, 83, 0.06);
}
.gloss-row.is-related {
  border-left-color: var(--accent-soft);
}
/* Right gutter is hidden until the Annotations toggle is on. */
.right-gutter {
  visibility: hidden;
}
[data-mode-annotations="on"] .right-gutter {
  visibility: visible;
}

.gloss-row .gloss-head {
  display: flex;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 3px;
}
.gloss-row .id {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--accent);
  letter-spacing: 0.04em;
  font-weight: 500;
}
.gloss-row .cred {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-2);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.cred-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  display: inline-block;
}
.cred-speculative {
  background: #c8867a;
}
.cred-tentative {
  background: #d6a868;
}
.cred-considered {
  background: #b8a44c;
}
.cred-confident {
  background: #7c9a58;
}
.cred-near-certain {
  background: #4f7a4e;
}
.str-weak {
  background: #c8867a;
}
.str-moderate {
  background: #d6a868;
}
.str-strong {
  background: #7c9a58;
}
.str-deductive {
  background: #3c5d8f;
}

.gloss-row .rel {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 4px 8px;
  font-family: var(--mono);
  font-size: 10.5px;
  margin-top: 2px;
}
.gloss-row .rel .key {
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.gloss-row .rel .vals {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.gloss-row .rel a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dotted transparent;
  cursor: pointer;
}
.gloss-row .rel a:hover {
  border-bottom-color: var(--accent);
}
.gloss-row .rel.supports a {
  color: var(--tint-supports);
}
.gloss-row .rel.attacks a {
  color: var(--tint-attacks);
}
.gloss-row .rel.rests-on a {
  color: var(--tint-rests);
}
.gloss-row .rel.unresolved a {
  color: var(--muted-2);
  font-style: italic;
}

/* term gloss content */
.gloss-row .term-def {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 12.5px;
  margin-top: 2px;
}
.gloss-row .term-aliases {
  margin-top: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted-2);
  letter-spacing: 0.02em;
}

/* --------- floating gloss popup (used on narrow screens) --------- */
.gloss-popup {
  position: fixed;
  z-index: 100;
  width: 320px;
  max-width: calc(100vw - 24px);
  padding: 14px 16px;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 6px;
  box-shadow:
    0 12px 36px -10px rgba(0, 0, 0, 0.18),
    0 2px 6px rgba(0, 0, 0, 0.04);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--muted);
  pointer-events: auto;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition:
    opacity 120ms ease,
    transform 120ms ease,
    visibility 0s linear 120ms;
}
.gloss-popup.is-visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition:
    opacity 120ms ease,
    transform 120ms ease,
    visibility 0s linear 0s;
}
.gloss-popup .gloss-head {
  margin-bottom: 4px;
}
.gloss-popup .id {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.gloss-popup .cred {
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-2);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.gloss-popup .term-def {
  font-style: italic;
  color: var(--ink-soft);
  margin-top: 4px;
}
.gloss-popup .term-aliases {
  margin-top: 4px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted-2);
}
.gloss-popup .rel {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 4px 8px;
  font-family: var(--mono);
  font-size: 11px;
  margin-top: 4px;
}
.gloss-popup .rel .key {
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.gloss-popup .rel .vals {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.gloss-popup .rel a {
  color: var(--accent);
  text-decoration: none;
}

/* --------- arrows overlay --------- */
.arrows {
  overflow: visible;
}
.arrows path {
  fill: none;
  stroke-width: 1.1;
  opacity: 0;
  transition: opacity 160ms;
}
.arrows path.is-active {
  opacity: 0.85;
}
.arrows path.supports {
  stroke: var(--tint-supports);
}
.arrows path.attacks {
  stroke: var(--tint-attacks);
  stroke-dasharray: 4 3;
}
.arrows path.rests-on {
  stroke: var(--tint-rests);
  stroke-dasharray: 1 3;
}
.arrows .head {
  opacity: 0;
  transition: opacity 160ms;
}
.arrows .head.is-active {
  opacity: 0.85;
}

/* --------- frontmatter panel --------- */
.frontmatter {
  max-width: 680px;
  margin: 0 auto 32px;
  display: none;
  border-top: 1px solid var(--rule-soft);
  padding-top: 24px;
}
[data-mode-frontmatter="on"] .frontmatter {
  display: block;
}

.fm-block {
  margin: 20px 0 32px;
}
.fm-block h3 {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 12px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.fm-block h3 .count {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--muted-2);
}

.fm-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 16px;
  padding: 10px 0;
  border-top: 1px solid var(--rule-soft);
  font-size: 15px;
  align-items: baseline;
}
.fm-row:last-child {
  border-bottom: 1px solid var(--rule-soft);
}
.fm-row .key {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--accent);
  letter-spacing: 0.02em;
}
.fm-row .desc {
  color: var(--ink-soft);
}
.fm-row .desc .alias {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  background: var(--bg-tint);
  padding: 1px 5px;
  margin: 1px 4px 0 0;
  border-radius: 3px;
}
.fm-row .desc .canon {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted-2);
  margin-top: 4px;
}

/* --------- graph panel (left gutter) --------- */
.graph-panel {
  display: none;
}
[data-mode-graph="on"] .graph-panel {
  display: block;
}
.graph-svg {
  position: absolute;
  inset: 0;
  overflow: visible;
  pointer-events: none;
}
.graph-svg .node-bg {
  fill: var(--paper);
  stroke: var(--rule);
  stroke-width: 1;
  pointer-events: auto;
  cursor: pointer;
}
.graph-svg .node-label {
  font-family: var(--mono);
  font-size: 10.5px;
  fill: var(--accent);
  pointer-events: none;
  dominant-baseline: middle;
  text-anchor: middle;
}
.graph-svg .node.is-active .node-bg {
  fill: var(--ink);
  stroke: var(--ink);
}
.graph-svg .node.is-active .node-label {
  fill: var(--paper);
}
.graph-svg .node.is-related .node-bg {
  stroke: var(--accent);
  stroke-width: 1.5;
  fill: var(--paper);
}
.graph-svg .node.is-related .node-label {
  fill: var(--ink);
}
.graph-svg .edge {
  fill: none;
  stroke-width: 1;
  opacity: 0.5;
}
.graph-svg .edge.supports {
  stroke: var(--tint-supports);
}
.graph-svg .edge.attacks {
  stroke: var(--tint-attacks);
  stroke-dasharray: 4 3;
}
.graph-svg .edge.rests-on {
  stroke: var(--tint-rests);
  stroke-dasharray: 1 3;
}
.graph-svg .edge.is-related {
  opacity: 0.95;
  stroke-width: 1.4;
}
.graph-svg .edge.is-dim {
  opacity: 0.18;
}
.graph-svg .node.is-dim {
  opacity: 0.35;
}

.graph-legend {
  position: sticky;
  top: 80px;
  font-family: var(--sans);
  font-size: 11px;
  color: var(--muted);
  padding: 10px 12px;
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 6px;
  margin-bottom: 16px;
  display: none;
}
[data-mode-graph="on"] .graph-legend {
  display: block;
}
.graph-legend .row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.graph-legend .swatch {
  width: 22px;
  height: 1px;
}
.graph-legend .swatch.supports {
  background: var(--tint-supports);
  height: 1.2px;
}
.graph-legend .swatch.attacks {
  background: var(--tint-attacks);
  height: 1.2px;
  opacity: 0.7;
  background-image: repeating-linear-gradient(
    90deg,
    var(--tint-attacks) 0 4px,
    transparent 4px 7px
  );
  background-color: transparent;
}
.graph-legend .swatch.rests-on {
  background-image: repeating-linear-gradient(
    90deg,
    var(--tint-rests) 0 1px,
    transparent 1px 4px
  );
  background-color: transparent;
  height: 1px;
}

/* narrow: graph renders above text */
@media (max-width: 1100px) {
  [data-mode-graph="on"] .graph-panel.narrow {
    display: block;
    position: relative;
    margin: 0 auto 28px;
    max-width: 680px;
    max-height: 800px;
    overflow-y: auto;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--paper);
    padding: 12px 16px;
  }
  [data-mode-graph="on"] .graph-panel.narrow .graph-legend {
    display: flex;
    gap: 12px;
    position: static;
    background: transparent;
    border: 0;
    padding: 0 0 8px;
    margin: 0;
  }
  [data-mode-graph="on"] .graph-panel.narrow .graph-svg {
    position: relative;
    inset: auto;
    display: block;
  }
}

/* --------- notes (footnotes) --------- */
.footnotes {
  max-width: 680px;
  margin: 56px auto 0;
  padding-top: 24px;
  border-top: 1px solid var(--rule-soft);
}
.footnotes h2 {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 12px;
}
.footnotes ol {
  font-size: 15px;
  color: var(--ink-soft);
  padding-left: 1.4em;
  margin: 0;
}
.footnotes li {
  margin: 0 0 10px;
}
.footnotes li[data-editorial="true"]::before {
  content: "editorial · ";
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: var(--accent);
  text-transform: uppercase;
}

/* --------- selection --------- */
::selection {
  background: rgba(122, 74, 31, 0.22);
  color: var(--ink);
}

</style>

            if (!tg)
                return;
            const a = sourceGloss.getBoundingClientRect();
            const b = tg.getBoundingClientRect();
            const ax = a.right - readerRect.left;
            const ay = a.top + a.height / 2 - readerRect.top;
            const bx = b.right - readerRect.left;
            const by = b.top + b.height / 2 - readerRect.top;
            const channel = Math.min(readerRect.width - 6, Math.max(ax, bx) + 18);
            const p = doc.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", `M ${ax} ${ay} L ${channel} ${ay} L ${channel} ${by} L ${bx - 2} ${by}`);
            p.setAttribute("class", `edge ${kind} is-active`);
            const marker = kind === "rests-on" ? "rests" : kind === "attacks" ? "attacks" : "supports";
            p.setAttribute("marker-end", `url(#ah-${marker})`);
            p.style.opacity = "0.85";
            svg.appendChild(p);
        };
        if ("supports" in rec) {
            for (const s of rec.supports)
                makeArrow(s, "supports");
            for (const s of rec.attacks)
                makeArrow(s, "attacks");
            for (const s of rec.restsOn)
                makeArrow(s, "rests-on");
        }
        if ("from" in rec) {
            for (const f of rec.from)
                makeArrow(f, "supports");
            makeArrow(rec.to, "supports");
        }
    };
    const setActive = (ann) => {
        clearActiveStates();
        if (!ann)
            return;
        ann.classList.add("is-active");
        const g = glossByAnn.get(ann);
        const isCompact = ann.classList.contains("ann-term") ||
            ann.classList.contains("ann-evidence") ||
            ann.classList.contains("ann-note-marker");
        if (g && (isCompact || !isGutterVisible())) {
            showPopup(ann, g.innerHTML);
            if (isGutterVisible())
                g.classList.add("is-active");
            return;
        }
        if (g) {
            g.classList.add("is-active", "is-expanded");
            if (win.getComputedStyle(g).display === "none") {
                g.classList.remove("is-expanded");
                showPopup(ann, g.innerHTML);
            }
        }
        const dataId = ann.dataset.id;
        if (ann.classList.contains("ann-claim") || dataId) {
            const id = dataId ?? "";
            highlightGraph(id);
            const rec = state.claims[id] ?? state.inferences[id];
            if (rec) {
                const related = [];
                if ("supports" in rec) {
                    related.push(...rec.supports, ...rec.attacks, ...rec.restsOn, rec.via);
                }
                if ("from" in rec) {
                    related.push(...rec.from, rec.to);
                }
                for (const rid of related.filter((r) => Boolean(r))) {
                    if (rid.includes(":"))
                        continue;
                    const rt = doc.getElementById(`claim-${rid}`) ?? doc.getElementById(`inf-${rid}`);
                    rt?.classList.add("is-related");
                    glossById.get(rid)?.classList.add("is-related", "is-expanded");
                }
                drawArrowsFor(ann, rec);
            }
        }
    };
    const attachHovers = () => {
        for (const ann of Array.from(proseEl.querySelectorAll(".ann"))) {
            ann.addEventListener("mouseenter", () => setActive(ann));
            ann.addEventListener("mouseleave", () => {
                hidePopup();
                clearActiveStates();
            });
        }
        for (const inf of Array.from(proseEl.querySelectorAll(".inference-block"))) {
            inf.addEventListener("mouseenter", () => setActive(inf));
            inf.addEventListener("mouseleave", () => {
                hidePopup();
                clearActiveStates();
            });
        }
        rightGutter.addEventListener("click", (e) => {
            const target = e.target;
            const a = target?.closest("a[data-target]");
            if (!a)
                return;
            const t = a.dataset.target;
            if (!t || t.includes(":"))
                return;
            e.preventDefault();
            const tgt = doc.getElementById(`claim-${t}`) ?? doc.getElementById(`inf-${t}`);
            if (tgt) {
                tgt.scrollIntoView({ block: "center", behavior: "smooth" });
                tgt.classList.add("is-active");
                win.setTimeout(() => tgt.classList.remove("is-active"), 1400);
            }
        });
    };
    // ---- toolbar ----
    const setupToolbar = () => {
        root.dataset.modeAnnotations = "off";
        root.dataset.modeFrontmatter = "off";
        root.dataset.modeGraph = "off";
        for (const btn of Array.from(root.querySelectorAll(".toolbar .btn"))) {
            btn.addEventListener("click", () => {
                const key = btn.dataset.toggle ?? "";
                const attrName = `mode${key.charAt(0).toUpperCase()}${key.slice(1)}`;
                const cur = root.dataset[attrName];
                const next = cur === "on" ? "off" : "on";
                root.dataset[attrName] = next;
                btn.setAttribute("aria-pressed", String(next === "on"));
                repositionGutter();
                if (key === "graph")
                    layoutGraph();
            });
        }
    };
    // ---- positioning ----
    function repositionGutter() {
        const reader = root.querySelector(".reader");
        if (!reader)
            return;
        const readerRect = reader.getBoundingClientRect();
        const placed = [];
        for (const [host, grp] of groupByHost.entries()) {
            const r = host.getBoundingClientRect();
            const y = r.top - readerRect.top + reader.scrollTop;
            grp.style.top = `${y}px`;
            grp.style.setProperty("--host-h", `${r.height}px`);
            const rowEls = Array.from(grp.children).filter((c) => c.classList.contains("gloss-row"));
            for (const row of rowEls)
                row.style.display = "";
            const cap = r.height;
            const expanded = grp.classList.contains("is-expanded-all");
            let wouldHide = 0;
            let acc = 0;
            for (const row of rowEls) {
                acc += row.offsetHeight + 1;
                if (acc > cap)
                    wouldHide++;
            }
            if (!expanded) {
                acc = 0;
                for (const row of rowEls) {
                    acc += row.offsetHeight + 1;
                    if (acc > cap)
                        row.style.display = "none";
                }
            }
            grp.classList.toggle("is-overflow", wouldHide > 0);
            if (wouldHide > 0)
                grp.setAttribute("data-overflow", String(wouldHide));
            else
                grp.removeAttribute("data-overflow");
            let moreBtn = grp.querySelector(".gloss-more");
            if (wouldHide > 0) {
                if (!moreBtn) {
                    moreBtn = doc.createElement("button");
                    moreBtn.type = "button";
                    moreBtn.className = "gloss-more";
                    moreBtn.addEventListener("click", (ev) => {
                        ev.stopPropagation();
                        const wasOpen = grp.classList.contains("is-expanded-all");
                        grp.classList.toggle("is-expanded-all", !wasOpen);
                        win.requestAnimationFrame(repositionGutter);
                    });
                    grp.appendChild(moreBtn);
                }
                moreBtn.textContent = expanded ? "show less" : `+${wouldHide} more`;
            }
            else if (moreBtn) {
                moreBtn.remove();
                grp.classList.remove("is-expanded-all");
            }
            placed.push({ host, grp, top: y, hostH: r.height });
        }
        placed.sort((a, b) => a.top - b.top);
        const gap = 8;
        let floor = Number.NEGATIVE_INFINITY;
        for (const item of placed) {
            const newTop = Math.max(item.top, floor);
            item.grp.style.top = `${newTop}px`;
            const expanded = item.grp.classList.contains("is-expanded-all");
            const contentH = item.grp.scrollHeight;
            const cap = item.hostH || contentH;
            const visibleH = expanded ? contentH : Math.min(cap, contentH);
            floor = newTop + visibleH + gap;
        }
        const aSvg = arrowsSvg();
        if (aSvg) {
            aSvg.setAttribute("width", String(readerRect.width));
            aSvg.setAttribute("height", String(reader.offsetHeight));
            aSvg.setAttribute("viewBox", `0 0 ${readerRect.width} ${reader.offsetHeight}`);
        }
    }
    // ---- graph view (left gutter) ----
    function layoutGraph() {
        const panel = root.querySelector(".graph-panel");
        const svg = root.querySelector(".graph-svg");
        const reader = root.querySelector(".reader");
        if (!panel || !svg || !reader)
            return;
        if (root.dataset.modeGraph !== "on") {
            svg.innerHTML = "";
            panel.classList.remove("narrow");
            return;
        }
        const narrow = isGraphPanelNarrow();
        panel.classList.toggle("narrow", narrow);
        const readerRect = reader.getBoundingClientRect();
        const panelRect = panel.getBoundingClientRect();
        svg.innerHTML = "";
        const defs = doc.createElementNS("http://www.w3.org/2000/svg", "defs");
        defs.innerHTML = `
      <marker id="g-ah-supports" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4a6a3e"/></marker>
      <marker id="g-ah-attacks"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8a3434"/></marker>
      <marker id="g-ah-rests"    viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6a614a"/></marker>
    `;
        svg.appendChild(defs);
        const positions = new Map();
        if (narrow) {
            let y = 24;
            const allIds = [
                ...new Set([
                    ...Array.from(proseEl.querySelectorAll(".ann-claim")).map((a) => a.dataset.id ?? ""),
                    ...Array.from(proseEl.querySelectorAll(".inference-block")).map((a) => a.dataset.id ?? ""),
                ]),
            ].filter(Boolean);
            for (const id of allIds) {
                positions.set(id, y);
                y += 34;
            }
            svg.setAttribute("width", String(panelRect.width - 32));
            svg.setAttribute("height", String(y + 16));
            svg.setAttribute("viewBox", `0 0 ${panelRect.width - 32} ${y + 16}`);
        }
        else {
            svg.setAttribute("width", String(panelRect.width));
            svg.setAttribute("height", String(reader.offsetHeight));
            svg.setAttribute("viewBox", `0 0 ${panelRect.width} ${reader.offsetHeight}`);
            for (const ann of Array.from(proseEl.querySelectorAll(".ann-claim"))) {
                const id = ann.dataset.id ?? "";
                if (positions.has(id) || !id)
                    continue;
                const r = ann.getBoundingClientRect();
                positions.set(id, r.top - readerRect.top + reader.scrollTop + r.height / 2);
            }
            for (const inf of Array.from(proseEl.querySelectorAll(".inference-block"))) {
                const id = inf.dataset.id ?? "";
                if (!id)
                    continue;
                const r = inf.getBoundingClientRect();
                positions.set(id, r.top - readerRect.top + reader.scrollTop + r.height / 2);
            }
        }
        const colX = narrow ? 60 : panelRect.width - 60;
        const nodeRadius = 22;
        const sorted = Array.from(positions.entries()).sort((a, b) => a[1] - b[1]);
        const minGap = narrow ? 32 : 28;
        let cursor = 0;
        const finalPos = new Map();
        for (const [id, y] of sorted) {
            const yy = Math.max(y, cursor);
            finalPos.set(id, yy);
            cursor = yy + minGap;
        }
        const pathBetween = (aId, bId, kind) => {
            const ay = finalPos.get(aId);
            const by = finalPos.get(bId);
            if (ay === undefined || by === undefined)
                return null;
            const minX = colX - nodeRadius - 2;
            const dy = Math.abs(by - ay);
            const arc = Math.min(36, Math.max(14, dy * 0.1));
            const ctrl = Math.max(6, minX - arc);
            const p = doc.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", `M ${minX} ${ay} C ${ctrl} ${ay}, ${ctrl} ${by}, ${minX} ${by}`);
            p.setAttribute("class", `edge ${kind}`);
            p.setAttribute("data-from", aId);
            p.setAttribute("data-to", bId);
            const marker = kind === "rests-on" ? "rests" : kind === "attacks" ? "attacks" : "supports";
            p.setAttribute("marker-end", `url(#g-ah-${marker})`);
            return p;
        };
        for (const [id, c] of Object.entries(state.claims)) {
            for (const s of c.supports) {
                const p = pathBetween(id, s, "supports");
                if (p)
                    svg.appendChild(p);
            }
            for (const s of c.attacks) {
                const p = pathBetween(id, s, "attacks");
                if (p)
                    svg.appendChild(p);
            }
            for (const s of c.restsOn) {
                const p = pathBetween(id, s, "rests-on");
                if (p)
                    svg.appendChild(p);
            }
        }
        for (const inf of Object.values(state.inferences)) {
            for (const f of inf.from) {
                const p = pathBetween(inf.id, f, "supports");
                if (p)
                    svg.appendChild(p);
            }
            if (inf.to) {
                const p = pathBetween(inf.id, inf.to, "supports");
                if (p)
                    svg.appendChild(p);
            }
        }
        for (const [id, y] of finalPos.entries()) {
            const g = doc.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node");
            g.setAttribute("data-id", id);
            const isInf = Boolean(state.inferences[id]);
            const w = Math.max(36, id.length * 6.5 + 14);
            const rect = doc.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("class", "node-bg");
            rect.setAttribute("x", String(colX - w / 2));
            rect.setAttribute("y", String(y - 11));
            rect.setAttribute("width", String(w));
            rect.setAttribute("height", "22");
            rect.setAttribute("rx", "11");
            if (isInf)
                rect.setAttribute("stroke-dasharray", "3 2");
            g.appendChild(rect);
            const txt = doc.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("class", "node-label");
            txt.setAttribute("x", String(colX));
            txt.setAttribute("y", String(y));
            txt.textContent = id;
            g.appendChild(txt);
            g.addEventListener("mouseenter", () => highlightGraph(id));
            g.addEventListener("mouseleave", () => unhighlightGraph());
            g.addEventListener("click", () => {
                const tgt = doc.getElementById(`claim-${id}`) ?? doc.getElementById(`inf-${id}`);
                if (tgt)
                    tgt.scrollIntoView({ block: "center", behavior: "smooth" });
            });
            svg.appendChild(g);
        }
    }
    function highlightGraph(id) {
        const svg = root.querySelector(".graph-svg");
        if (!svg || root.dataset.modeGraph !== "on")
            return;
        for (const n of Array.from(svg.querySelectorAll("g.node")))
            n.classList.add("is-dim");
        for (const e of Array.from(svg.querySelectorAll("path.edge")))
            e.classList.add("is-dim");
        const cssEscape = typeof CSS !== "undefined" && CSS.escape ? CSS.escape : (s) => s.replace(/"/g, '\\"');
        const here = svg.querySelector(`g.node[data-id="${cssEscape(id)}"]`);
        if (here) {
            here.classList.remove("is-dim");
            here.classList.add("is-active");
        }
        const rec = state.claims[id] ?? state.inferences[id];
        if (!rec)
            return;
        const relList = [];
        if ("supports" in rec)
            relList.push(...rec.supports, ...rec.attacks, ...rec.restsOn, rec.via);
        if ("from" in rec)
            relList.push(...rec.from, rec.to);
        const rel = new Set(relList.filter((r) => Boolean(r)));
        for (const rid of rel) {
            const rn = svg.querySelector(`g.node[data-id="${cssEscape(rid)}"]`);
            if (rn) {
                rn.classList.remove("is-dim");
                rn.classList.add("is-related");
            }
            const e1 = svg.querySelector(`path.edge[data-from="${cssEscape(id)}"][data-to="${cssEscape(rid)}"]`);
            const e2 = svg.querySelector(`path.edge[data-from="${cssEscape(rid)}"][data-to="${cssEscape(id)}"]`);
            e1?.classList.remove("is-dim");
            e1?.classList.add("is-active");
            e2?.classList.remove("is-dim");
            e2?.classList.add("is-active");
        }
    }
    function unhighlightGraph() {
        const svg = root.querySelector(".graph-svg");
        if (!svg)
            return;
        for (const n of Array.from(svg.querySelectorAll("g.node"))) {
            n.classList.remove("is-dim", "is-active");
        }
        for (const e of Array.from(svg.querySelectorAll("path.edge"))) {
            e.classList.remove("is-dim");
        }
    }
    // ---- init ----
    attachHovers();
    setupToolbar();
    win.requestAnimationFrame(() => {
        repositionGutter();
        layoutGraph();
    });
    win.addEventListener("resize", () => {
        repositionGutter();
        layoutGraph();
    });
    const fonts = doc.fonts;
    if (fonts && typeof fonts.ready === "object") {
        void fonts.ready.then(() => {
            repositionGutter();
            layoutGraph();
        });
    }
}

mount(document, window);
})();

</script>
</body>
</html>
