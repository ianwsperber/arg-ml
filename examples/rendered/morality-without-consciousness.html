<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morality without Consciousness</title>
<style>
:root {
  --bg: #ffffff;
  --bg-tint: #f4f2ec;
  --paper: #ffffff;
  --ink: #1c1b18;
  --ink-soft: #2d2a23;
  --muted: #6b6962;
  --muted-2: #a09c92;
  --rule: #d8d4c8;
  --rule-soft: #ece8dc;
  --accent: #7a4a1f;
  --accent-soft: #b88753;
  --highlight: rgba(184, 135, 83, 0.1);
  --highlight-strong: rgba(184, 135, 83, 0.22);

  --tint-supports: #4a6a3e;
  --tint-attacks: #8a3434;
  --tint-rests: #6a614a;

  --serif:
    "Source Serif 4", "Source Serif Pro", Charter, "Iowan Old Style", Georgia,
    serif;
  --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* {
  box-sizing: border-box;
}
html,
body {
  background: var(--bg);
  color: var(--ink);
  margin: 0;
}
body {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.62;
  font-feature-settings: "kern", "liga", "onum";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
}

/* --------- shell --------- */
#root {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 28px 96px;
}

.doc-header {
  max-width: 680px;
  margin: 64px auto 18px;
}
.doc-eyebrow {
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.doc-title {
  font-family: var(--serif);
  font-size: 46px;
  line-height: 1.08;
  font-weight: 600;
  letter-spacing: -0.012em;
  margin: 0 0 14px;
  text-wrap: balance;
}
.doc-byline {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  align-items: baseline;
}
.doc-byline .sep {
  color: var(--muted-2);
}
.doc-byline a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px dotted var(--muted-2);
}
.doc-byline a:hover {
  border-bottom-color: var(--ink);
  color: var(--ink);
}

.epistemic-banner {
  max-width: 680px;
  margin: 0 auto 24px;
  padding: 14px 18px 16px;
  background: #faf6ec;
  border-left: 2px solid var(--accent);
  font-size: 15.5px;
  color: var(--ink-soft);
}
.epistemic-banner .label {
  display: block;
  font-family: var(--sans);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}

/* --------- toolbar --------- */
.toolbar {
  position: sticky;
  top: 14px;
  z-index: 30;
  max-width: 720px;
  margin: 8px auto 28px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 7px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(10px) saturate(1.1);
  border: 1px solid var(--rule-soft);
  border-radius: 999px;
  box-shadow:
    0 1px 0 rgba(0, 0, 0, 0.02),
    0 8px 24px -16px rgba(60, 40, 20, 0.18);
}
.toolbar .brand {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0 12px 0 8px;
  border-right: 1px solid var(--rule-soft);
  margin-right: 4px;
}
.toolbar .group {
  display: flex;
  gap: 2px;
  flex: 1;
}
.toolbar .btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  background: transparent;
  border: 0;
  padding: 7px 14px;
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  gap: 8px;
  align-items: center;
  transition: background 120ms;
}
.toolbar .btn:hover {
  background: var(--bg-tint);
}
.toolbar .btn[aria-pressed="true"] {
  background: var(--ink);
  color: var(--paper);
}
.toolbar .btn[aria-pressed="true"]:hover {
  background: #2c2a23;
}
.toolbar .btn .dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--muted-2);
}
.toolbar .btn[aria-pressed="true"] .dot {
  background: var(--paper);
}

/* --------- reader grid --------- */
.reader {
  display: grid;
  grid-template-columns: minmax(0, 1fr) min(680px, calc(100% - 0px)) minmax(
      0,
      1fr
    );
  column-gap: 28px;
  position: relative;
}
.reader > .prose {
  grid-column: 2;
  position: relative;
  min-width: 0;
}
.reader > .right-gutter {
  grid-column: 3;
  position: relative;
  min-width: 0;
}
.reader > .left-gutter {
  grid-column: 1;
  position: relative;
  min-width: 0;
}
.reader > .arrows {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  width: 100%;
  height: 100%;
}

@media (max-width: 1200px) {
  .reader {
    grid-template-columns: minmax(0, 1fr) min(680px, 100%) 280px;
    column-gap: 22px;
  }
}
@media (max-width: 1100px) {
  .reader {
    grid-template-columns: 1fr;
    column-gap: 0;
  }
  .reader > .prose {
    grid-column: 1;
    max-width: 680px;
    margin: 0 auto;
  }
  .reader > .right-gutter {
    display: none;
  }
  .reader > .left-gutter {
    display: none;
  }
  .reader > .arrows {
    display: none;
  }
}

/* --------- prose --------- */
.prose h2 {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -0.008em;
  margin: 56px 0 14px;
  text-wrap: balance;
}
.prose h2 .h-rule {
  display: block;
  width: 32px;
  height: 1px;
  background: var(--accent);
  margin: 0 0 18px;
}
.prose h3 {
  font-size: 22px;
  margin: 36px 0 10px;
  font-weight: 600;
}
.prose p {
  margin: 0 0 18px;
  text-wrap: pretty;
}
.prose em {
  font-style: italic;
}
.prose strong {
  font-weight: 600;
}
.prose a {
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  transition: border-color 120ms;
}
.prose a:hover {
  border-bottom-color: var(--ink);
}
.prose code {
  font-family: var(--mono);
  font-size: 0.86em;
  background: var(--bg-tint);
  padding: 1px 4px;
  border-radius: 3px;
}

/* --------- annotated spans (in-text, default state subtle) --------- */
.ann-term {
  border-bottom: 1px dotted var(--muted-2);
  cursor: help;
  transition:
    background 120ms,
    border-color 120ms;
}
.ann-term[data-external="true"]::after {
  content: "↗";
  font-size: 0.62em;
  vertical-align: super;
  margin-left: 0.06em;
  color: var(--muted-2);
}

.ann-claim {
  cursor: help;
  position: relative;
  border-radius: 2px;
  transition: background 140ms;
}

.ann-claim.is-active,
.ann-term.is-active {
  background: var(--highlight-strong);
}
.ann-claim.is-related {
  background: var(--highlight);
  outline: 1px dashed var(--accent-soft);
  outline-offset: 1px;
}
.ann-claim[data-defeasible="false"] {
  border-bottom: 1px solid var(--accent-soft);
}

/* Inference block */
.inference-block {
  margin: 26px 0;
  padding: 14px 18px;
  background: var(--bg-tint);
  border-left: 2px solid var(--accent);
  border-radius: 0 4px 4px 0;
  position: relative;
  font-style: italic;
  font-size: 17px;
  line-height: 1.55;
}
.inference-block .inf-head {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  font-style: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.inference-block .inf-meta {
  color: var(--muted);
  margin-left: 4px;
  text-transform: none;
  letter-spacing: 0;
  font-family: var(--mono);
  font-size: 11px;
}

/* Evidence superscript */
.ann-evidence {
  font-family: var(--mono);
  font-size: 0.62em;
  font-style: normal;
  vertical-align: super;
  color: var(--accent);
  text-decoration: none;
  margin-left: 1px;
  padding: 0 2px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--paper);
  cursor: help;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.ann-evidence:hover {
  background: var(--bg-tint);
}

/* Note → numbered superscript */
.ann-note-marker {
  font-family: var(--mono);
  font-size: 0.62em;
  vertical-align: super;
  color: var(--accent);
  text-decoration: none;
  margin: 0 1px;
  padding: 0 3px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 2px;
  cursor: pointer;
}
.ann-note-marker:hover {
  background: var(--bg-tint);
}

/* --------- gloss chips in right gutter --------- */
.right-gutter {
  min-height: 100%;
}
.gloss-group {
  position: absolute;
  left: 0;
  right: 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  pointer-events: auto;
}
.gloss-more {
  align-self: flex-start;
  margin-top: 2px;
  font: 9.5px var(--mono);
  color: var(--muted-2);
  letter-spacing: 0.05em;
  background: transparent;
  border: 0;
  padding: 2px 0;
  cursor: pointer;
  text-align: left;
}
.gloss-more:hover {
  color: var(--accent);
}
.gloss-row {
  font-family: var(--sans);
  font-size: 12px;
  line-height: 1.42;
  color: var(--muted);
  border-left: 2px solid var(--rule-soft);
  padding: 3px 0 3px 10px;
  cursor: default;
  transition:
    border-color 120ms ease,
    background 120ms ease,
    padding 120ms ease;
}
.gloss-row > :not(.gloss-head) {
  display: none;
}
.gloss-row > .gloss-head {
  margin-bottom: 0;
  cursor: pointer;
}
.gloss-row.is-expanded {
  padding: 6px 0 8px 10px;
}
.gloss-row.is-expanded > * {
  display: block;
}
.gloss-row.is-expanded > .gloss-head {
  display: flex;
  margin-bottom: 4px;
}
.gloss-row.is-expanded > .rel {
  display: grid;
}
.gloss-row:hover {
  border-left-color: var(--muted-2);
  background: rgba(0, 0, 0, 0.015);
}
.gloss-row.is-active {
  border-left-color: var(--accent);
  background: rgba(184, 135, 83, 0.06);
}
.gloss-row.is-related {
  border-left-color: var(--accent-soft);
}
/* Right gutter is hidden until the Annotations toggle is on. */
.right-gutter {
  visibility: hidden;
}
[data-mode-annotations="on"] .right-gutter {
  visibility: visible;
}

.gloss-row .gloss-head {
  display: flex;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 3px;
}
.gloss-row .id {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--accent);
  letter-spacing: 0.04em;
  font-weight: 500;
}
.gloss-row .cred {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-2);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.cred-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  display: inline-block;
}
.cred-speculative {
  background: #c8867a;
}
.cred-tentative {
  background: #d6a868;
}
.cred-considered {
  background: #b8a44c;
}
.cred-confident {
  background: #7c9a58;
}
.cred-near-certain {
  background: #4f7a4e;
}
.str-weak {
  background: #c8867a;
}
.str-moderate {
  background: #d6a868;
}
.str-strong {
  background: #7c9a58;
}
.str-deductive {
  background: #3c5d8f;
}

.gloss-row .rel {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 4px 8px;
  font-family: var(--mono);
  font-size: 10.5px;
  margin-top: 2px;
}
.gloss-row .rel .key {
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.gloss-row .rel .vals {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.gloss-row .rel a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dotted transparent;
  cursor: pointer;
}
.gloss-row .rel a:hover {
  border-bottom-color: var(--accent);
}
.gloss-row .rel.supports a {
  color: var(--tint-supports);
}
.gloss-row .rel.attacks a {
  color: var(--tint-attacks);
}
.gloss-row .rel.rests-on a {
  color: var(--tint-rests);
}
.gloss-row .rel.unresolved a {
  color: var(--muted-2);
  font-style: italic;
}

/* term gloss content */
.gloss-row .term-def {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 12.5px;
  margin-top: 2px;
}
.gloss-row .term-aliases {
  margin-top: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted-2);
  letter-spacing: 0.02em;
}

/* --------- floating gloss popup (used on narrow screens) --------- */
.gloss-popup {
  position: fixed;
  z-index: 100;
  width: 320px;
  max-width: calc(100vw - 24px);
  padding: 14px 16px;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 6px;
  box-shadow:
    0 12px 36px -10px rgba(0, 0, 0, 0.18),
    0 2px 6px rgba(0, 0, 0, 0.04);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--muted);
  pointer-events: auto;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition:
    opacity 120ms ease,
    transform 120ms ease,
    visibility 0s linear 120ms;
}
.gloss-popup.is-visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition:
    opacity 120ms ease,
    transform 120ms ease,
    visibility 0s linear 0s;
}
.gloss-popup .gloss-head {
  margin-bottom: 4px;
}
.gloss-popup .id {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.gloss-popup .cred {
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-2);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.gloss-popup .term-def {
  font-style: italic;
  color: var(--ink-soft);
  margin-top: 4px;
}
.gloss-popup .term-aliases {
  margin-top: 4px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted-2);
}
.gloss-popup .rel {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 4px 8px;
  font-family: var(--mono);
  font-size: 11px;
  margin-top: 4px;
}
.gloss-popup .rel .key {
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.gloss-popup .rel .vals {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.gloss-popup .rel a {
  color: var(--accent);
  text-decoration: none;
}

/* --------- arrows overlay --------- */
.arrows {
  overflow: visible;
}
.arrows path {
  fill: none;
  stroke-width: 1.1;
  opacity: 0;
  transition: opacity 160ms;
}
.arrows path.is-active {
  opacity: 0.85;
}
.arrows path.supports {
  stroke: var(--tint-supports);
}
.arrows path.attacks {
  stroke: var(--tint-attacks);
  stroke-dasharray: 4 3;
}
.arrows path.rests-on {
  stroke: var(--tint-rests);
  stroke-dasharray: 1 3;
}
.arrows .head {
  opacity: 0;
  transition: opacity 160ms;
}
.arrows .head.is-active {
  opacity: 0.85;
}

/* --------- frontmatter panel --------- */
.frontmatter {
  max-width: 680px;
  margin: 0 auto 32px;
  display: none;
  border-top: 1px solid var(--rule-soft);
  padding-top: 24px;
}
[data-mode-frontmatter="on"] .frontmatter {
  display: block;
}

.fm-block {
  margin: 20px 0 32px;
}
.fm-block h3 {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 12px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.fm-block h3 .count {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--muted-2);
}

.fm-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 16px;
  padding: 10px 0;
  border-top: 1px solid var(--rule-soft);
  font-size: 15px;
  align-items: baseline;
}
.fm-row:last-child {
  border-bottom: 1px solid var(--rule-soft);
}
.fm-row .key {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--accent);
  letter-spacing: 0.02em;
}
.fm-row .desc {
  color: var(--ink-soft);
}
.fm-row .desc .alias {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  background: var(--bg-tint);
  padding: 1px 5px;
  margin: 1px 4px 0 0;
  border-radius: 3px;
}
.fm-row .desc .canon {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted-2);
  margin-top: 4px;
}

/* --------- graph panel (left gutter) --------- */
.graph-panel {
  display: none;
}
[data-mode-graph="on"] .graph-panel {
  display: block;
}
.graph-svg {
  position: absolute;
  inset: 0;
  overflow: visible;
  pointer-events: none;
}
.graph-svg .node-bg {
  fill: var(--paper);
  stroke: var(--rule);
  stroke-width: 1;
  pointer-events: auto;
  cursor: pointer;
}
.graph-svg .node-label {
  font-family: var(--mono);
  font-size: 10.5px;
  fill: var(--accent);
  pointer-events: none;
  dominant-baseline: middle;
  text-anchor: middle;
}
.graph-svg .node.is-active .node-bg {
  fill: var(--ink);
  stroke: var(--ink);
}
.graph-svg .node.is-active .node-label {
  fill: var(--paper);
}
.graph-svg .node.is-related .node-bg {
  stroke: var(--accent);
  stroke-width: 1.5;
  fill: var(--paper);
}
.graph-svg .node.is-related .node-label {
  fill: var(--ink);
}
.graph-svg .edge {
  fill: none;
  stroke-width: 1;
  opacity: 0.5;
}
.graph-svg .edge.supports {
  stroke: var(--tint-supports);
}
.graph-svg .edge.attacks {
  stroke: var(--tint-attacks);
  stroke-dasharray: 4 3;
}
.graph-svg .edge.rests-on {
  stroke: var(--tint-rests);
  stroke-dasharray: 1 3;
}
.graph-svg .edge.is-related {
  opacity: 0.95;
  stroke-width: 1.4;
}
.graph-svg .edge.is-dim {
  opacity: 0.18;
}
.graph-svg .node.is-dim {
  opacity: 0.35;
}

.graph-legend {
  position: sticky;
  top: 80px;
  font-family: var(--sans);
  font-size: 11px;
  color: var(--muted);
  padding: 10px 12px;
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 6px;
  margin-bottom: 16px;
  display: none;
}
[data-mode-graph="on"] .graph-legend {
  display: block;
}
.graph-legend .row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.graph-legend .swatch {
  width: 22px;
  height: 1px;
}
.graph-legend .swatch.supports {
  background: var(--tint-supports);
  height: 1.2px;
}
.graph-legend .swatch.attacks {
  background: var(--tint-attacks);
  height: 1.2px;
  opacity: 0.7;
  background-image: repeating-linear-gradient(
    90deg,
    var(--tint-attacks) 0 4px,
    transparent 4px 7px
  );
  background-color: transparent;
}
.graph-legend .swatch.rests-on {
  background-image: repeating-linear-gradient(
    90deg,
    var(--tint-rests) 0 1px,

      </term>

  <body>
    <p>A recent post by [@Linch](https://www.lesswrong.com/users/linch?mention=user),
    "[The Fourth World](https://www.lesswrong.com/posts/qfitpqvQzeZy2mSGi/the-fourth-world),"
    gets at an important implication of
    <term ref="consciousness">consciousness</term>— namely, that we ought to
    suspect further aspects of reality than we can today observe—but I'm not
    sure it arrives there the right way, or that it derives the correct
    conclusions.<note>In the author's defense, in a footnote they clarify that
    they are "not that interested in the difference between whether these worlds
    are truly different or just conceptually interesting ways to talk about
    things." But the post's arguments rely heavily on the reality of this
    difference, so I will address it anyways.</note></p>

    <p>The author makes two assumptions in his post which ought not to come for
    free. <claim id="C1.1" attacks="linch:no-physicalism" attack-type="undermine"
                credence="confident">Firstly, the author assumes that we could
    not explain <term ref="consciousness">consciousness</term> through
    <term ref="physicalism">physicalism</term>.</claim>
    <claim id="C1.2" supports="C1.1" credence="near-certain">This is already a
    strong claim, one with which about half of surveyed philosophers
    disagree.<evidence type="survey" ref="https://survey2020.philpeople.org">
      <gloss>2020 PhilPapers Survey: 51.93% of respondents accepted or leaned
      toward physicalism about the mind, while 32.08% favored non-physicalism.
      Bourget, D. &amp; Chalmers, D. J., "Philosophers on Philosophy: The 2020
      PhilPapers Survey."</gloss>
    </evidence></claim>
    <claim id="C1.3" attacks="linch:consciousness-grounds-morality"
            attack-type="undermine" credence="confident">Secondly, the author
    assumes that <term ref="consciousness">consciousness</term> is the basis for
    morality, or that our moral obligations are primarily due toward conscious
    beings.</claim></p>

    <p><claim id="C1.4" credence="tentative">I think this second assumption is
    particularly common.</claim> At a recent meetup, I heard a participant
    complain that it is really hard to talk about
    <term ref="consciousness">consciousness</term>, because we are always tying
    up <term ref="consciousness">consciousness</term> with morality.
    <claim id="C1.5" supports="C1.4" credence="speculative">I suspect this
    happens because we sneak in non-physicalist assumptions about
    <term ref="consciousness">consciousness</term> into discussions about
    morality.</claim></p>

    <p>So, <claim id="C1.6" rests-on="linch:further-unobserved-reality"
                  credence="confident">I would like to defend the author's claim
    that <term ref="consciousness">consciousness</term> ought to cause us to
    suppose further unobserved aspects of reality (which could be very different
    from the reality we know), while also defending a purely physicalist
    explanation for <term ref="consciousness">consciousness</term>, and
    decoupling <term ref="consciousness">consciousness</term> from
    morality.</claim> I will continue to respond to specific arguments in "The
    Fourth World," though my goal is to articulate my own, positive argument,
    rather than critique the post.</p>

    <p>Throughout, whenever I refer to "<term ref="consciousness">consciousness</term>"
    without a qualifier, I am referring to phenomenal
    <term ref="consciousness">consciousness</term>, or the "hard problem" of
    <term ref="consciousness">consciousness</term>, or
    <term ref="consciousness">qualia</term>. I'll use words like
    "<term ref="cognition">cognition</term>" or
    "<term ref="neurophysiology">neurophysiology</term>" to refer to
    non-phenomenal processes, which we typically understand as explainable by
    modern neuroscience, even if imperfectly.
    <claim id="C1.7" credence="considered">The distinction is important, as we
    otherwise backdoor capabilities like judgment and agency into
    <term ref="consciousness">consciousness</term> without sufficient
    justification.</claim>
    <claim id="C1.8" supports="C1.5" credence="considered">I believe this is the
    crux of <em>why</em> so many of us intuit
    <term ref="consciousness">consciousness</term> as a prerequisite for
    morality, when I think it is very possibly not the case.</claim></p>

    <section>
      <heading level="1">Dualism as Semantics</heading>

      <p><em>Check out the [basic case for physicalism](https://www.lesswrong.com/s/FqgKAHZAiZn9JAjDo)
      if you haven't already. I might repeat some arguments for
      <term ref="physicalism">physicalism</term> through this post, but I won't
      make a full, bottom-up argument.</em></p>

      <p>The author introduces us to his fourth world by supposing three
      distinct domains to reality: the physical world, the mathematical world,
      and <term ref="consciousness">consciousness</term>. The author later
      claims that a non-conscious, robot civilization would never suspect
      <term ref="consciousness">consciousness</term> exists.</p>

      <p>I surmise the author is pointing at some kind of
      <term ref="dualism">dualism</term>, with mathematics and logic being a
      third, metaphysical entity. <claim id="C2.1" credence="considered">The
      difficulty with dualist claims is that they either rely on a "mystical,"
      non-physical substance, or they rely on semantic qualifications for the
      physical world.</claim></p>

      <p>For example, let us suppose that we learn
      <term ref="consciousness">consciousness</term> is actually the emergence
      of a soul, dipping its head in from some heavenly plane of existence. We
      learn that all our physical laws are arbitrary and completely determined
      by the whim of God. In this extreme scenario, do we then accept
      <term ref="dualism">dualism</term>?</p>

      <p>Let's reframe the question. Let us suppose instead that we learn
      <term ref="consciousness">consciousness</term> is the emergence of higher
      dimensional reality within our own. That higher dimensional reality
      determines all the physical laws of our known universe. In this scenario,
      do we accept <term ref="dualism">dualism</term>, or merely expand our
      definition of physics to account for our new knowledge of reality?</p>

      <p><claim id="C2.2" credence="considered">My point is that nearly all
      explanations for <term ref="consciousness">consciousness</term> ought to
      collapse towards <term ref="physicalism">physicalism</term>, because any
      fundamental discoveries required to explain
      <term ref="consciousness">consciousness</term> also compel us to redefine
      physics accordingly.</claim> I will retain the term "mysticism" for any
      explanations that depart so far from a conventional understanding of
      reality as to render an expansion of the term
      "<term ref="physicalism">physicalism</term>" meaningless, i.e. if
      <term ref="consciousness">consciousness</term> is actually the soul. So,
      we could concede <term ref="dualism">dualism</term> for the first example,
      but we ought to stick to <term ref="physicalism">physicalism</term> for
      the second.</p>

      <p><claim id="C2.3" supports="C2.4" attacks="linch:robots-cant-find-consciousness"
                attack-type="rebut" credence="considered">If we accept a
      physicalist explanation of phenomena as at least <em>possible</em>, then
      we should not assume a robot civilization could never discover
      <term ref="consciousness">consciousness</term>.</claim> We have no way to
      observe or infer <term ref="consciousness">consciousness</term> today, but
      if <term ref="consciousness">consciousness</term> exists in physical
      reality, then it at least seems it <em>might</em> be possible.
      <claim id="C2.4" supports="C2.3" credence="confident">Without a scientific
      explanation for the hard problem of
      <term ref="consciousness">consciousness</term>, it is premature to rule
      this out.</claim></p>
    </section>

    <section>
      <heading level="1">Phenomena are Intrinsic</heading>

      <p>Aside from a physicalist or mystic explanation for
      <term ref="consciousness">consciousness</term>, we could also suppose that
      phenomena do not exist at all, or that
      <term ref="consciousness">consciousness</term> is an
      illusion.<note>A few days before I finalized this post, Tenobrus wrote an
      [article on X](https://x.com/tenobrus/status/2044671918109048876) that
      might serve as a popular example of this view. Daniel Dennett's
      "[Quining Qualia](https://web.ics.purdue.edu/~drkelly/DennettQuiningQualia1988.pdf)"
      is a foundational text here.</note>
      [Illusionism](https://plato.stanford.edu/entries/qualia/#IllAboQua) is a
      highly counterintuitive stance, given we all have the vivid impression of
      our own <term ref="consciousness">consciousness</term> (how do you
      convince someone that they do not actually perceive the "redness of
      red"?). In some sense, our subjective experience is the <em>only</em>
      thing we know (cf. solipsism), so it seems really weird to claim it does
      not actually exist.</p>

      <p><claim id="C3.1" rests-on="A1" credence="confident">Our experience of
      existence <em>is</em> phenomenal, so I don't see a way to refute the hard
      problem without asserting we are all already zombies (I experience, yet
      sadly I do not exist).</claim> This is contrary to my own axiomatic belief
      that I experience existence, so I don't see any way to proceed further
      with a strong illusionist argument. If you choose a different axiom, well,
      ok.</p>

      <p><claim id="C3.2" credence="considered">But
      <term ref="illusionism">illusionism</term> is right to question what and
      when something is actually phenomenal.</claim> In other words, I find it
      weird to refute <term ref="consciousness">qualia</term>, but legitimate to
      debate the <em>scope</em> of <term ref="consciousness">qualia</term>.
      <claim id="C3.3" supports="C3.2" credence="considered">Because when
      referring to <term ref="consciousness">consciousness</term>, we are often
      actually referring to the reactive and evaluative machinery <em>behind</em>
      <term ref="consciousness">consciousness</term>, e.g.
      <term ref="cognition">cognition</term>, and not to phenomena
      themselves.</claim></p>

      <p>Consider our phenomenal experience of pain. We generally dislike pain,
      and indeed many ethical frameworks take for granted that we ought to
      minimize suffering. But why? When we say pain is bad, are we evaluating a
      distinct "quale of pain" as bad, or are we reacting negatively to the
      <term ref="neurophysiology">neurophysiological</term> process of pain?</p>

      <p>I'll refer to this as the difference between an <em>extrinsic</em> and
      <em>intrinsic</em> interpretation of
      <term ref="consciousness">consciousness</term>. If we take a physicalist
      position of the hard problem of
      <term ref="consciousness">consciousness</term>, then we can suppose
      phenomena are either <em>intrinsic</em> in
      <term ref="neurophysiology">neurophysiological</term> processes in a way
      that we do not yet understand, or that phenomena are <em>extrinsic</em> to
      <term ref="neurophysiology">neurophysiological</term> processes. In other
      words, is there a property of
      <term ref="neurophysiology">neurophysiology</term> that we cannot yet
      quantify (like weight) or are there entities extrinsic to our
      <term ref="neurophysiology">neurophysiological</term> makeup that we have
      not yet discovered (like a particle).</p>

      <p><claim id="C3.4" credence="considered">My reading of the dominant
      theories of <term ref="consciousness">consciousness</term> (e.g., IIT,
      Global Workspace Theory) is that they lean toward an
      <term ref="intrinsic-view">intrinsic view</term>.</claim> Essentially,
      there is something about our
      <term ref="neurophysiology">neurophysiology</term> that just <em>does</em>
      induce phenomena. The two are inseparable, phenomena just <em>are</em> a
      property of some <term ref="neurophysiology">neurophysiological</term>
      processes. We don't know yet what something is, though it might involve
      [weird fundamental physics](https://www.youtube.com/watch?v=DI6Hu-DhQwE).
      In this view, there is no sense in talking about a phenomenon of pain
      <em>separate</em> from the underlying
      <term ref="neurophysiology">neurophysiological</term> activity, in the
      same way it does not make sense to discuss weight separate from gravity or
      mass.</p>

      <p>For an extrinsic example, imagine that there was an undetected particle
      of <term ref="consciousness">consciousness</term>, the
      <term ref="c-particle">c-particle</term>, which somehow interacted with
      <term ref="neurophysiology">neurophysiological</term> processes, or were
      produced by them. Phenomena are actually composed of
      <term ref="c-particle">c-particles</term>. We might further suppose that
      <term ref="c-particle">c-particles</term> come in many flavors. There is a
      <term ref="c-particle">c-particle</term> of pain, a
      <term ref="c-particle">c-particle</term> of happiness, etc. Or perhaps
      they're just different arrangements of
      <term ref="c-particle">c-particles</term>, who knows! Mental states, as we
      understand them, are actually determined by
      <term ref="c-particle">c-particles</term>. Unlike with an
      <term ref="intrinsic-view">intrinsic view</term> of phenomena, it actually
      <em>is</em> coherent to discuss pain separate from the underlying
      <term ref="neurophysiology">neurophysiology</term>. We just need the right
      <term ref="c-particle">c-particles</term>.</p>

      <p>I have admittedly chosen a silly example for an
      <term ref="extrinsic-view">extrinsic view</term> of
      <term ref="consciousness">consciousness</term>; I imagine few would argue
      for an actual "<term ref="c-particle">c-particle</term>."
      <claim id="C3.5" credence="confident">But any
      <term ref="extrinsic-view">extrinsic view</term> will require a mysterious
      "something else" to explain <term ref="consciousness">consciousness</term>,
      which must then causally interact with our
      <term ref="neurophysiology">neurophysiology</term>, unless we are willing
      to accept <term ref="consciousness">consciousness</term> as a mere
      <term ref="epiphenomenalism">epiphenomenal</term> side-effect.</claim></p>

      <p>It would be wrong to claim either of these theories are "correct." As
      physicalists, we have to accept this as a question for science, and in
      reality, <term ref="consciousness">consciousness</term> may not fit so
      neatly into my intrinsic/extrinsic divide.
      <claim id="C3.6" via="I-3.1" credence="considered">But I still find it
      much more <em>likely</em> that
      <term ref="consciousness">consciousness</term> is somehow intrinsic to
      <term ref="neurophysiology">neurophysiology</term>.</claim>
      <claim id="C3.7" supports="C3.6" credence="confident">An
      <term ref="intrinsic-view">intrinsic theory</term> requires less deviation
      from contemporary neuroscience, as we don't have to posit that
      neuroscience is somehow insufficient to explain mental processes (no
      <term ref="c-particle">c-particles</term> intervene),</claim> and
      <claim id="C3.8" supports="C3.6" credence="considered">we can neatly
      sidestep some of the problems of
      <term ref="epiphenomenalism">epiphenomenalism</term> (certain mental
      states are intrinsically experiential).</claim></p>

      <inference id="I-3.1" from="C3.5 C3.7 C3.8" to="C3.6"
                 scheme="inference-to-best-explanation"
                 defeasible="true" strength="moderate">
        An <term ref="intrinsic-view">intrinsic theory</term> requires less
        deviation from contemporary neuroscience and sidesteps the problems of
        <term ref="epiphenomenalism">epiphenomenalism</term>; an
        <term ref="extrinsic-view">extrinsic view</term> would require positing
        a mysterious additional substance. The intrinsic option therefore
        better explains <term ref="consciousness">consciousness</term> on
        physicalist grounds.
      </inference>

      <p>So, <claim id="C3.9" rests-on="A1" supports="C4.1" via="I-3.1"
                    credence="considered">if we suppose an
      <term ref="intrinsic-view">intrinsic</term>, physicalist theory of
      <term ref="consciousness">consciousness</term>, then our experience of
      pain is by definition <em>inseparable</em> from the pain reaction
      itself.</claim> It is, in fact, <em>nonsensical</em> to discuss an
      experience of pain distinct from the
      <term ref="neurophysiology">neurophysiological</term> activity associated
      with pain. That is pain; the thing itself <em>is</em> the
      <term ref="neurophysiology">neurophysiology</term>!</p>

      <p><claim id="C3.10" supports="C3.9" credence="tentative">I suspect
      <term ref="illusionism">illusionism</term> is right that there is nothing
      like a <term ref="c-particle">c-particle</term>.</claim> There is no
      independent experience or <term ref="consciousness">qualia</term> of a
      good cup of coffee—there is only the experience of our own
      <term ref="neurophysiology">neurophysiology</term> tasting the coffee and
      evaluating it as good.
      <claim id="C3.11" supports="C3.9" credence="considered">Consciousness
      itself is not responsible for judgment and evaluations—that work is all
      done by the mechanics of
      <term ref="neurophysiology">neurophysiology</term>. Consciousness does not
      "intervene" to make its own decisions.</claim><note>I suspect one reason
      some people cling to an <term ref="extrinsic-view">extrinsic view</term>
      of <term ref="consciousness">consciousness</term> is that they want to
      retain a black box for "free will" to drive decisions.</note></p>

      <!-- The post's markdown contains a fifth footnote that has no inline
           anchor in the body: "My personal opinion is that illusionists, like
           Daniel Dennett, do sometimes rely on tricks of semantic distinctions
           to make claims against qualia, the same way Chalmers does to make
           non-physicalist explanations for consciousness." Attaching it here
           as an editorial note since the surrounding paragraphs are the most
           thematically relevant; Ian may want to re-anchor it. -->
      <note status="editorial">My personal opinion is that illusionists, like
      Daniel Dennett, do sometimes rely on tricks of semantic distinctions to
      make claims against <term ref="consciousness">qualia</term>, the same way
      Chalmers does to make non-physicalist explanations for
      <term ref="consciousness">consciousness</term>.</note>
    </section>

    <section>
      <heading level="1">Generalizing Ethics with Preferences</heading>

      <p>I'd now like to consider the ethics downstream of a physicalist,
      intrinsic understanding of <term ref="consciousness">consciousness</term>.
      <claim id="C4.1" supports="C4.5" rests-on="C3.9" credence="considered">Namely,
      if <term ref="consciousness">consciousness</term> is intrinsic to
      <term ref="neurophysiology">neurophysiological</term> activity, then why
      should ethics fix itself on the conscious aspects of that activity? Is
      this not an arbitrary distinction? Should we not rather respect the
      <em><term ref="preference">preferences</term></em> those activities
      represent?</claim></p>

      <p><claim id="C4.2" credence="speculative">I suspect that phenomena, as
      intrinsic properties of <term ref="neurophysiology">neurophysiology</term>,
      are undifferentiated.</claim> A chair and an apple have different weights,
      but we don't distinguish the weight of furniture from the weight of fruit.
      Similarly, our experience of pain and happiness may <em>feel</em>
      different, and may correspond to different biological states, but both
      experiences are ultimately "just" phenomena, distinguished thanks to our
      mental capacities. I would guess that the same is true even of sensory
      <term ref="consciousness">qualia</term>, like the "redness of red."</p>

      <p>If all this seems highly speculative, then let me simply state that
      <claim id="C4.3" supports="C4.1" credence="considered">no phenomenon seems
      to me inherently good or bad. Experiencing happiness is distinct from
      experiencing happiness as good.</claim> Now, there might be something
      about e.g. dopamine that causes me to <em>want</em> more happiness. But
      that is a consequence of my
      <term ref="neurophysiology">neurophysiology</term>, it is one of the
      reasons I experience happiness as good. It's not a quality of my
      experience of happiness (the phenomenon of happiness) itself.</p>

      <p>Perhaps one could object that there is no experience of happiness
      without wanting happiness to continue, or no experience of suffering
      without wanting suffering to stop; that the mental state cannot be
      differentiated from its reaction. <claim id="C4.4" supports="C4.5"
              credence="considered">But is this not just another reason to focus
      on the reaction, or the expressed
      <term ref="preference">preference</term>, rather than the experience
      itself?</claim></p>

      <p>The distinction I'm trying to make may be irrelevant when discussing
      humans, who have well understood <term ref="preference">preferences</term>
      for different mental states. But we have to be very precise if we would
      like to generalize moral principles to non-human intelligence.</p>

      <p>Let's suppose we are visited by a highly developed species of alien
      goo. We suppose the aliens are somehow biological, but it's unclear! The
      aliens are very different from us. The aliens also have the strange habit
      of climbing to the tallest point in any room they enter. If for any reason
      the aliens cannot reach the tallest point, as in when they are restrained,
      the alien goo begins to vibrate. When released, the alien quickly proceeds
      to climb to the tallest point in the room.</p>

      <p>Now, imagine the aliens are observing your living room. The aliens are
      very bad at detecting electromagnetic radiation and mostly observe the
      world through touch and vibration. The aliens are very interested in your
      potted plant, which slowly adjusts its leaves over the course of the day.
      The aliens can't tell that the plant is adjusting to the sunlight. They
      just observe that the plant always closes up its leaves for half the day.</p>

      <p>Question: Without any further information, do we have a moral
      obligation to allow the alien to climb to the highest point in our room?
      Does the alien have a moral obligation to allow the plant to close its
      leaves?</p>

      <p>Ultimately the answer will depend on your moral framework.
      <claim id="C4.5" supports="C4.6" via="I-3.1" credence="considered">But if
      you would agree that we have a moral obligation not to cause an alien
      pain, then I think you should say yes, we are both morally obliged to
      allow the observed entity to act according to their inferred
      <term ref="preference">preference</term>.</claim></p>

      <p>In both scenarios, the observed entity exhibits a clear
      <term ref="preference">preference</term>. The alien always wants to climb
      as high as possible. The plant always wants to open and close its leaves.
      We don't have any clear idea of whether the entities in question are
      conscious. But why would this matter?
      <claim id="C4.6" credence="considered">Consciousness is intrinsic to some
      unknown subset of entities in the universe. Neither we nor the alien can
      detect whether an entity is conscious. But we <em>do</em> know that
      <term ref="consciousness">consciousness</term> has always corresponded
      with the expression of
      <term ref="preference">preferences</term>.</claim></p>

      <p>You might be thinking that the real difference is the plant's response
      to light is entirely automatic, while we are deeply cognitive agents. You
      can't compare our <term ref="preference">preferences</term> to those of a
      plant! <claim id="C4.7" credence="tentative">But I think this overlooks
      how dumbly reactive a lot of
      <term ref="preference">preferences</term> are, even if they are unclearly
      expressed.</claim> If you poke me with a needle, I will want you to stop,
      even if I keep a straight face. I don't have very much control over my
      pain response. It just happens!</p>

      <p><claim id="C4.8" credence="tentative">We might qualify that a
      <term ref="preference">preference</term> should represent an entity's
      interests counter to the second law of thermodynamics.</claim> A rolling
      stone does not represent a <term ref="preference">preference</term>.
      However, if it began to roll uphill, it would!</p>

      <p>I anticipate several counterarguments to a naïve definition of
      <term ref="preference">preference</term>, with potentially absurd
      conclusions. For example, suppose the alien also noticed your rotating
      fan. Wouldn't the alien have to suppose a moral obligation to the fan as
      well? And how do we avoid moral equivalences between turning off a fan and
      trimming a plant and killing a person?</p>

      <p>These are legitimate lines of critique that a moral framework using
      <term ref="preference">preference</term> as the qualifier for moral
      obligation would have to answer. But it's easy to imagine different
      mechanisms to do this, such as by defining some heuristic for the
      "strength" of <term ref="preference">preference</term>, similar to the way
      utilitarianism thinks about utility, or looking at the reversibility of
      decisions. I'm also not trying to argue for some sort of cosmic
      libertarianism. The practice of ethics is inevitably messy, with lots of
      confusing gray areas. A good follow-up would be to evaluate a full moral
      system based on <term ref="preference">preference</term>, maybe trying to
      stress test a few repurposed moral imperatives in a system that made no
      assumptions about <term ref="consciousness">consciousness</term>.
      <claim id="C4.9" credence="tentative">However, I am optimistic that in
      every instance where one might be tempted to evaluate ethics on the basis
      of <term ref="consciousness">consciousness</term>, one could instead
      insert <term ref="preference">preference</term>.</claim></p>
    </section>

    <section>
      <heading level="1">An Unobserved Reality</heading>

      <p>I accept that you might find my argument for
      <term ref="preference">preferences</term> insufficient, either because an
      ethical system for <term ref="preference">preference</term> is not yet
      defined, or because you believe that
      <term ref="consciousness">consciousness</term> itself is very special.
      Though a physicalist should wonder <em>why</em>
      <term ref="consciousness">consciousness</term> is restricted to the mind,
      it's certainly the popular consensus.</p>

      <p>What I question is how one can be confident that
      <term ref="consciousness">consciousness</term> is unique?
      <claim id="C5.1" supports="linch:further-unobserved-reality"
              credence="considered">We already know there is at least
      <em>one</em> aspect to reality that is utterly unobservable to an
      outsider. We would have no concept of phenomena if it were not for our own
      minds. Is this not the best possible evidence that there might be
      <em>other</em> aspects of reality we cannot observe?</claim></p>

      <p>This is what "The Fourth World" gets right. Though why limit ourselves
      to a "fourth" world? <claim id="C5.2" supports="C5.4"
              credence="speculative">For all we know, there might be
      <em>infinitely</em> many aspects of reality that we cannot observe today,
      or which may be fundamentally unobservable.</claim> Like the author, I
      find this incredibly exciting.</p>

      <p><claim id="C5.3" supports="C5.4" rests-on="C5.1" credence="considered">But
      these tremendous unknowns as to the nature of reality should give us pause
      before rating <term ref="consciousness">consciousness</term> as unique and
      morally important.</claim></p>

      <p>Let's consider a speculative example, meant to demonstrate the logical
      possibility of alternatives to
      <term ref="consciousness">consciousness</term> in a physicalist universe.</p>

      <p>Returning to our earlier alien scenario, let's pretend we have
      uncovered the physical substrate for
      <term ref="consciousness">consciousness</term>. In fact, it's now
      relatively easy to purchase
      <term ref="consciousness">qualia</term> counters, which, functioning
      similar to a Geiger counter, allow us to estimate the "amount" of
      phenomena in an entity. Holding our
      <term ref="consciousness">qualia</term> counter up to the alien goo, we
      fail to detect any phenomenal
      <term ref="consciousness">consciousness</term>!</p>

      <p>However, the aliens have their own device. The alien physiology somehow
      fails to produce <term ref="consciousness">consciousness</term>, but it
      <em>does</em> involve some other, mysterious aspect of reality… say,
      "<term ref="monads">monads</term>." And lowering a
      "<term ref="monads">monad</term>" counter down to us, the aliens fail to
      detect a single one.</p>

      <p><claim id="C5.4" supports="C5.5" credence="considered">If we accept
      there could be <em>further</em> aspects of reality that we cannot observe,
      not unlike <term ref="consciousness">consciousness</term>, then we should
      not take for granted that <term ref="consciousness">consciousness</term>
      is privileged among intelligent beings.</claim> I understand this is very
      weird to consider, but I do not think it is any weirder than the hard
      problem of <term ref="consciousness">consciousness</term> is already. Our
      example is similar to Nagel's famous "What it's like to be a …" thought
      experiment, with the additional caveat that we swap out
      <term ref="consciousness">consciousness</term> itself for some new,
      unknown aspect of reality. Rather than ask what it is like to experience
      the <term ref="consciousness">qualia</term> of a bat with a bat's
      <term ref="cognition">cognition</term>, we ask what it is like to have the
      "<term ref="monads">monads</term>" of an alien goo with an alien goo's
      <term ref="cognition">cognition</term> (where
      "<term ref="monads">monads</term>" are strictly different from
      <term ref="consciousness">qualia</term>).</p>

      <p>All the standard caveats that conceivability does not mean reality
      apply. <claim id="C5.5" credence="tentative">But given the existing
      evidence for alternative paths to
      <term ref="cognition">cognition</term> from terrestrial
      <term ref="neurophysiology">neurophysiology</term> (e.g. machine
      intelligence), we ought to consider seriously whether there might be
      alternatives to phenomena <em>like</em>
      <term ref="consciousness">consciousness</term>, but substantively
      different.</claim></p>
    </section>

    <section>
      <heading level="1">Recap</heading>

      <p>To summarize my argument:</p>

      <p>1. <claim id="C6.1" supports="C6.2" credence="considered">Physicalism
      is a popular and reasonable explanation of
      <term ref="consciousness">consciousness</term>.</claim></p>

      <p>2. <claim id="C6.2" supports="C6.3" via="I-3.1" credence="considered">A
      physicalist's best guess should be that
      <term ref="consciousness">consciousness</term> is somehow intrinsic to
      <term ref="neurophysiology">neurophysiology</term>, otherwise we have to
      make strange ontological and scientific conclusions (like
      <term ref="c-particle">c-particles</term>).</claim></p>

      <p>3. <claim id="C6.3" supports="C6.4" rests-on="C3.9"
                    credence="considered">Once we assume
      <term ref="consciousness">consciousness</term> is physically intrinsic to
      the <term ref="neurophysiology">neurophysiological</term> process itself,
      it is no longer necessary to assume moral obligations to one aspect of
      that process.</claim></p>

      <p>4. <claim id="C6.4" supports="C4.9" credence="considered">We should
      instead assess moral obligations to the
      <term ref="preference">preferences</term> exhibited by
      <term ref="neurophysiology">neurophysiology</term>. Presumably, we also
      owe some obligations to any agent which exhibits
      <term ref="preference">preferences</term>, but this is the responsibility
      of a moral framework to judge.</claim></p>

      <p>5. <claim id="C6.5" credence="tentative">One can try to defend an
      obligation to <term ref="consciousness">consciousness</term> by asserting
      it is special.</claim></p>

      <p>6. <claim id="C6.6" attacks="C6.5" attack-type="undercut"
                    supports="C6.7" rests-on="C5.1" credence="considered">However,
      if we cannot observe <term ref="consciousness">consciousness</term>, we
      ought to suppose there could be further aspects of reality we cannot
      observe, similar or dissimilar to
      <term ref="consciousness">consciousness</term> in ways we do not yet
      understand.</claim></p>

      <p>7. <claim id="C6.7" supports="C5.5" credence="tentative">It is
      conceptually possible to imagine beings very different from ourselves
      whose <term ref="cognition">cognition</term> involves these unknown
      aspects of reality. So, it would be premature to determine that
      <term ref="consciousness">consciousness</term> demands unique
      obligations.</claim></p>

      <p>Obviously, these final conclusions are several steps removed from
      ground truth. However, I have tried to surface the implications of what I
      assess to be the most likely explanations for phenomenal
      <term ref="consciousness">consciousness</term>. For better or worse, a lot
      of beliefs are downstream of our explanations for
      <term ref="consciousness">consciousness</term>. While the hard problem
      remains unsolved, it would be good to continue exploring the ethical
      implications of different theories.</p>
    </section>

            }
            for (const s of c.restsOn) {
                const p = pathBetween(id, s, "rests-on");
                if (p)
                    svg.appendChild(p);
            }
        }
        for (const inf of Object.values(state.inferences)) {
            for (const f of inf.from) {
                const p = pathBetween(inf.id, f, "supports");
                if (p)
                    svg.appendChild(p);
            }
            if (inf.to) {
                const p = pathBetween(inf.id, inf.to, "supports");
                if (p)
                    svg.appendChild(p);
            }
        }
        for (const [id, y] of finalPos.entries()) {
            const g = doc.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node");
            g.setAttribute("data-id", id);
            const isInf = Boolean(state.inferences[id]);
            const w = Math.max(36, id.length * 6.5 + 14);
            const rect = doc.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("class", "node-bg");
            rect.setAttribute("x", String(colX - w / 2));
            rect.setAttribute("y", String(y - 11));
            rect.setAttribute("width", String(w));
            rect.setAttribute("height", "22");
            rect.setAttribute("rx", "11");
            if (isInf)
                rect.setAttribute("stroke-dasharray", "3 2");
            g.appendChild(rect);
            const txt = doc.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("class", "node-label");
            txt.setAttribute("x", String(colX));
            txt.setAttribute("y", String(y));
            txt.textContent = id;
            g.appendChild(txt);
            g.addEventListener("mouseenter", () => highlightGraph(id));
            g.addEventListener("mouseleave", () => unhighlightGraph());
            g.addEventListener("click", () => {
                const tgt = doc.getElementById(`claim-${id}`) ?? doc.getElementById(`inf-${id}`);
                if (tgt)
                    tgt.scrollIntoView({ block: "center", behavior: "smooth" });
            });
            svg.appendChild(g);
        }
    }
    function highlightGraph(id) {
        const svg = root.querySelector(".graph-svg");
        if (!svg || root.dataset.modeGraph !== "on")
            return;
        for (const n of Array.from(svg.querySelectorAll("g.node")))
            n.classList.add("is-dim");
        for (const e of Array.from(svg.querySelectorAll("path.edge")))
            e.classList.add("is-dim");
        const cssEscape = typeof CSS !== "undefined" && CSS.escape ? CSS.escape : (s) => s.replace(/"/g, '\\"');
        const here = svg.querySelector(`g.node[data-id="${cssEscape(id)}"]`);
        if (here) {
            here.classList.remove("is-dim");
            here.classList.add("is-active");
        }
        const rec = state.claims[id] ?? state.inferences[id];
        if (!rec)
            return;
        const relList = [];
        if ("supports" in rec)
            relList.push(...rec.supports, ...rec.attacks, ...rec.restsOn, rec.via);
        if ("from" in rec)
            relList.push(...rec.from, rec.to);
        const rel = new Set(relList.filter((r) => Boolean(r)));
        for (const rid of rel) {
            const rn = svg.querySelector(`g.node[data-id="${cssEscape(rid)}"]`);
            if (rn) {
                rn.classList.remove("is-dim");
                rn.classList.add("is-related");
            }
            const e1 = svg.querySelector(`path.edge[data-from="${cssEscape(id)}"][data-to="${cssEscape(rid)}"]`);
            const e2 = svg.querySelector(`path.edge[data-from="${cssEscape(rid)}"][data-to="${cssEscape(id)}"]`);
            e1?.classList.remove("is-dim");
            e1?.classList.add("is-active");
            e2?.classList.remove("is-dim");
            e2?.classList.add("is-active");
        }
    }
    function unhighlightGraph() {
        const svg = root.querySelector(".graph-svg");
        if (!svg)
            return;
        for (const n of Array.from(svg.querySelectorAll("g.node"))) {
            n.classList.remove("is-dim", "is-active");
        }
        for (const e of Array.from(svg.querySelectorAll("path.edge"))) {
            e.classList.remove("is-dim");
        }
    }
    // ---- init ----
    attachHovers();
    setupToolbar();
    win.requestAnimationFrame(() => {
        repositionGutter();
        layoutGraph();
    });
    win.addEventListener("resize", () => {
        repositionGutter();
        layoutGraph();
    });
    const fonts = doc.fonts;
    if (fonts && typeof fonts.ready === "object") {
        void fonts.ready.then(() => {
            repositionGutter();
            layoutGraph();
        });
    }
}

mount(document, window);
})();

</script>
</body>
</html>
